<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image Upload and Prediction Display</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f8f9fa;
            margin: 0;
        }
        .upload-container {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        .image-preview {
            margin-top: 20px;
            width: 100%;
            max-width: 300px;
            height: auto;
            display: none;
        }
        .prediction-container {
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="upload-container">
        <h2>Upload an Image</h2>
        <input class="form-control" type="file" id="imageUpload" accept="image/jpeg, image/jpg, image/png">
        <img id="imagePreview" class="image-preview" src="#" alt="Image Preview">
        <div id="predictionContainer" class="prediction-container alert alert-info" role="alert">
            <strong>Prediction:</strong> <span id="predictionText"></span>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('imageUpload').addEventListener('change', function(event) {
            const file = event.target.files[0];
            const imagePreview = document.getElementById('imagePreview');
            const predictionContainer = document.getElementById('predictionContainer');
            const predictionText = document.getElementById('predictionText');

            if (file) {
                const validImageTypes = ['image/jpeg', 'image/jpg', 'image/png'];
                if (validImageTypes.includes(file.type)) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        // Display the image preview
                        imagePreview.src = e.target.result;
                        imagePreview.style.display = 'block';

                        // Prepare the form data
                        const formData = new FormData();
                        formData.append('file', file);

                        // Send the image to the server
                        fetch('/upload', {
                            method: 'POST',
                            body: formData
                        })
                        .then(response => {
                            if (!response.ok) {
                                throw new Error('Network response was not ok');
                            }
                            return response.json();
                        })
                        .then(data => {
                            // Display the prediction result
                            if (data.recognized_names && data.recognized_names.length > 0) {
                                predictionText.textContent = 'Recognized: ' + data.recognized_names.join(', ');
                            } else if (data.error) {
                                predictionText.textContent = 'Error: ' + data.error;
                            } else {
                                predictionText.textContent = 'No faces recognized.';
                            }
                            predictionContainer.style.display = 'block';
                        })
                        .catch(error => {
                            console.error('Error:', error);
                            predictionText.textContent = 'An error occurred while processing the image.';
                            predictionContainer.style.display = 'block';
                        });
                    };
                    reader.readAsDataURL(file);
                } else {
                    alert('Please select a valid image file (JPEG, JPG, or PNG).');
                    imagePreview.style.display = 'none';
                    predictionContainer.style.display = 'none';
                }
            } else {
                imagePreview.style.display = 'none';
                predictionContainer.style.display = 'none';
            }
        });
    </script>
</body>
</html>
