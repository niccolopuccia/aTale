<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera Feed</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        .camera-box {
            width: 620px;
            height: 540px;
            border: 2px solid #333;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
        }
        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div class="camera-box">
        <img id="camera-feed" src="{{ url_for('video_feed') }}" alt="Camera Feed">
    </div>

    <audio id="audio-player"></audio>
    <script>
        // Poll the server for recognized faces
        compared_person = "Unknown"
        setInterval(async () => {
            const response = await fetch('/current_recognition'); // Add this endpoint to your server
            const recognizedPerson = await response.text();
            if (recognizedPerson && recognizedPerson !== "Unknown" && recognizedPerson != compared_person) {
                playSound(recognizedPerson);
            }
            compared_person = recognizedPerson
        }, 2000);

        function playSound(name) {
            const audioPlayer = document.getElementById('audio-player');
            const soundUrl = `/play_sound/${name}`;
            audioPlayer.src = soundUrl;
            console.log(audioPlayer.src); // Debug the source URL
            audioPlayer.play();
        }
    </script>
</body>
</html>
